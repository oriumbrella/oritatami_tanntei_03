<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パン屋強盗事件　報告メール</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    padding: 14px;
    background: #e9eef3;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 100%;
    max-width: 760px;
    position: relative;
    z-index: 1;
  }

  .mail {
    overflow: hidden;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    transition: 0.6s;
  }

  .mail.sending {
    transform: translateY(-18px);
    opacity: 0.45;
  }

  .header {
    padding: 14px 18px;
    background: #2f3542;
    color: #ffffff;
    font-weight: bold;
  }

  .row {
    display: flex;
    padding: 12px 18px;
    border-bottom: 1px solid #dddddd;
    overflow-wrap: anywhere;
  }

  .label {
    width: 80px;
    flex-shrink: 0;
    color: #777777;
  }

  .row a,
  .reply-title a {
    color: inherit;
  }

  textarea {
    display: block;
    width: 100%;
    height: 300px;
    padding: 22px;
    border: none;
    outline: none;
    resize: none;
    background: #ffffff;
    color: #222222;
    font-family: inherit;
    font-size: 16px;
    line-height: 1.7;
  }

  .footer-area {
    padding: 14px 18px;
    background: #f1f2f6;
    text-align: right;
  }

  button {
    border: none;
    border-radius: 6px;
    padding: 10px 28px;
    background: #494B9D;
    color: #ffffff;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.5;
    background: #999999;
  }

  .status {
    margin-top: 16px;
    color: #555555;
    text-align: center;
  }

  .notification {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 16px 18px;
    border-radius: 10px;
    background: #ffffff;
    color: #333333;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    text-align: left;
    font-weight: bold;
    cursor: pointer;
    pointer-events: auto;
    touch-action: manipulation;
    position: relative;
    z-index: 2000;
  }

  .notification:hover {
    background: #f7f7fa;
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(0, 0, 0, 0.45);
  }

  .reply {
    position: fixed;
    top: 50%;
    left: 50%;
    z-index: 1000;
    width: 90%;
    max-width: 600px;
    max-height: 84vh;
    overflow-y: auto;
    padding: 24px;
    border-radius: 12px;
    background: #ffffff;
    color: #222222;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    transform: translate(-50%, -50%);
  }

  .reply-title {
    padding: 0 35px 12px 0;
    border-bottom: 1px solid #dddddd;
    font-weight: bold;
    line-height: 1.6;
  }

  .reply-suffix {
    margin-top: 8px;
    color: #494B9D;
  }

  #replyText {
    padding-top: 18px;
    line-height: 1.8;
  }

  .reply-paragraph {
    margin: 0 0 16px;
    white-space: pre-line;
    overflow-wrap: anywhere;
  }

  .reply-list {
    margin: 0 0 16px;
    padding-left: 24px;
    line-height: 1.9;
  }

  .closeBtn {
    position: absolute;
    top: 12px;
    right: 16px;
    width: auto;
    padding: 0;
    border: none;
    background: none;
    color: #666666;
    font-size: 24px;
  }

  .closeBtn:hover {
    color: #000000;
  }

  .xPostWrap {
    margin-top: 18px;
    text-align: center;
  }

  .xPostBtn {
    background: #000000;
    color: #ffffff;
  }

  .optionArea {
    margin-top: 18px;
  }

  .optionBtn {
    display: block;
    width: 100%;
    margin-top: 8px;
    padding: 10px 18px;
    background: #494B9D;
    color: #ffffff;
    text-align: left;
  }

  .optionBtn:hover,
  .xPostBtn:hover {
    opacity: 0.8;
  }

  footer {
    width: 100%;
    margin-top: 24px;
    color: #555555;
    font-size: 12px;
    line-height: 1.7;
    text-align: center;
  }

  [hidden] {
    display: none !important;
  }

  @media (max-width: 520px) {
    body {
      justify-content: flex-start;
    }

    textarea {
      height: 260px;
      padding: 16px;
    }

    .row {
      padding: 11px 14px;
      font-size: 14px;
    }

    .label {
      width: 58px;
    }

    .reply {
      width: 94%;
      padding: 20px;
    }
  }
</style>
</head>

<body>

<div class="app">
  <div class="mail" id="mailBox">
    <div class="header">パン屋強盗事件　報告メール</div>

    <div class="row">
      <div class="label">To</div>
      <div>
        <a href="mailto:N.F@koreha.fiction.da">N.F@koreha.fiction.da</a>
      </div>
    </div>

    <div class="row">
      <div class="label">Subject</div>
      <div>パン屋強盗事件　報告メール</div>
    </div>

    <textarea id="answer" placeholder="ここに報告内容を入力してください"></textarea>

    <div class="footer-area">
      <button id="sendButton" type="button" disabled>送信</button>
    </div>
  </div>

  <div id="status" class="status" hidden>送信中…</div>

  <button id="notification" class="notification" type="button" hidden>
    📩 新着メール 1件
  </button>
</div>

<div id="overlay" class="overlay" hidden></div>

<div id="reply" class="reply" role="dialog" aria-modal="true" hidden>
  <button id="closeReplyButton" class="closeBtn" type="button">×</button>

  <div class="reply-title">
    From:
    <a href="mailto:N.F@koreha.fiction.da">N.F@koreha.fiction.da</a><br>
    Subject: RE: パン屋強盗事件　報告メール
    <div id="replySuffix" class="reply-suffix" hidden></div>
  </div>

  <div id="replyText"></div>
</div>

<footer>
  本作品はフィクションです。実際の地名・団体・人物とは一切関係ございません。<br>
  X: @r4lu3m8l
</footer>

<script>
  const answerBox = document.getElementById("answer");
  const sendButton = document.getElementById("sendButton");
  const notification = document.getElementById("notification");
  const status = document.getElementById("status");
  const mailBox = document.getElementById("mailBox");
  const overlay = document.getElementById("overlay");
  const reply = document.getElementById("reply");
  const replyText = document.getElementById("replyText");
  const replySuffix = document.getElementById("replySuffix");
  const closeReplyButton = document.getElementById("closeReplyButton");

  const newMailQueue = [];

  let isSending = false;
  let isReplyOpen = false;
  let typingToken = 0;

  const otherLanguages = [
    "スペイン語",
    "フランス語",
    "ドイツ語",
    "イタリア語",
    "ポルトガル語",
    "ロシア語",
    "中国語",
    "日本語",
    "韓国語",
    "ハングル",
    "アラビア語",
    "ヒンディー語",
    "タイ語",
    "ベトナム語",
    "トルコ語",
    "ペルシャ語",
    "ギリシャ語",
    "スウェーデン語",
    "ノルウェー語",
    "オランダ語",
    "ウクライナ語",
    "インドネシア語"
  ];

  const optionLabels = {
    1: "①1/9、7/9、9/9について",
    2: "②ある程度わかったが次どうしたらいいか",
    3: "③その先がわからない",
    4: "④もう少し一緒に考えてほしい"
  };

  const optionReplies = {
    1: {
      segments: [
        {
          type: "text",
          text: "これは日付、ではないのかもしれないな。\n条件に合致しそうなものを見つけてくれ。"
        }
      ],
      suffix: "＞1/9、7/9、9/9について"
    },

    2: {
      segments: [
        {
          type: "text",
          text: "私に何かできることはないだろうか。\n指示をくれれば行動可能だ。"
        }
      ],
      suffix: "＞ある程度わかったが次どうしたらいいか"
    },

    3: {
      segments: [
        {
          type: "text",
          text: "おそらく「1/9、7/9、9/9」をもう一度使うのだろう。\nメニューリストのなかに9文字になれる単語はないだろうか。"
        }
      ],
      suffix: "＞その先がわからない",
      options: [4]
    },

    4: {
      segments: [
        {
          type: "text",
          text: "このままでは9文字の条件に合わない。\n別の言語に変えられないだろうか。\n言語を指定してくれれば私のわかる範囲で書き出そう。"
        }
      ]
    }
  };

  function containsAny(text, words) {
    return words.some(function(word) {
      return text.includes(word);
    });
  }

  function updateSendButton() {
    sendButton.disabled = isSending || answerBox.value.trim() === "";
  }

  function updateNotification() {
    if (isReplyOpen || newMailQueue.length === 0) {
      notification.hidden = true;
      return;
    }

    notification.hidden = false;
    notification.disabled = false;
    notification.textContent = "📩 新着メール " + newMailQueue.length + "件";
  }

  function queueNewMail(replyData) {
    newMailQueue.push(replyData);
    updateNotification();
  }

  function getReplyData(input) {
    if (containsAny(input, ["cat", "Cat", "ネコ", "キャット", "猫"])) {
      return {
        segments: [
          {
            type: "text",
            text: "パン屋強盗事件　報告を受領した。\n猫、か。\nご主人に聞いたところ飼い猫の「ミルクちゃん」は日課の散歩にでかけたそうだ。\nミルクちゃんを追えば何かわかるかもしれない。\n\n今回も見事な推理だった。また頼むよ。"
          }
        ],
        showXPost: true
      };
    }

    if (containsAny(input, ["商品名"])) {
      return {
        segments: [
          {
            type: "text",
            text: "なるほど…商品名か。\nしかしそれでは盗まれたものがわからないな。\n私にできることはあるだろうか？"
          }
        ]
      };
    }

    if (containsAny(input, ["英語"])) {
      return {
        segments: [
          {
            type: "text",
            text: "なるほど、英語か…\nざっと書き出すとこんな感じだろうか"
          },
          {
            type: "list",
            items: [
              "French bread",
              "Chocolate cornet",
              "Apple pie",
              "Croissant",
              "Melon pan",
              "White bread",
              "Sandwich"
            ]
          }
        ]
      };
    }

    if (containsAny(input, ["menu list", "メニューリスト", "Menu List"])) {
      return {
        segments: [
          {
            type: "text",
            text: "メニューリスト…ああここにあった。内容を共有する。"
          },
          {
            type: "list",
            items: [
              "フランスパン",
              "チョココロネ",
              "アップルパイ",
              "クロワッサン",
              "メロンパン",
              "食パン",
              "サンドウィッチ"
            ]
          },
          {
            type: "text",
            text: "何か役に立つだろうか"
          }
        ]
      };
    }

    if (containsAny(input, ["bread", "BREAD", "パン"])) {
      return {
        segments: [
          {
            type: "text",
            text: "ポイントカードの店に来たが、まさかここでも事件が起こるとはな。\nなんだか怖くなってきたよ。"
          }
        ]
      };
    }

    if (containsAny(input, ["三田駅", "みたえき", "mitaeki", "春野鏡子"])) {
      return {
        segments: [
          {
            type: "text",
            text: "次々と事件が起こるな…。"
          }
        ]
      };
    }

    if (containsAny(input, ["わからない", "ヒント"])) {
      return {
        segments: [
          {
            type: "text",
            text: "一緒に思考を整理しよう。\nまずは君の推理を聞かせてくれ。"
          }
        ],
        options: [1, 2, 3]
      };
    }

    if (containsAny(input, otherLanguages)) {
      return {
        segments: [
          {
            type: "text",
            text: "すまない…その言語には明るくなくてね…"
          }
        ]
      };
    }

    if (containsAny(input, ["N.F"])) {
      return {
        segments: [
          {
            type: "text",
            text: "こういった暗号や謎の類は苦手でね…足で捜査することなら任せてくれ。"
          }
        ]
      };
    }

    return {
      segments: [
        {
          type: "text",
          text: "なるほど…情報が足りない。もう一度確認してほしい。"
        }
      ]
    };
  }

  function sendMail() {
    const input = answerBox.value.trim();

    if (input === "" || isSending) {
      return;
    }

    const replyData = getReplyData(input);

    isSending = true;
    updateSendButton();

    status.textContent = "送信中…";
    status.hidden = false;

    mailBox.classList.add("sending");
    notification.hidden = true;

    setTimeout(function() {
      status.hidden = true;
      mailBox.classList.remove("sending");
      isSending = false;

      if (answerBox.value.trim() === input) {
        answerBox.value = "";
      }

      updateSendButton();
      queueNewMail(replyData);
    }, 1000);
  }

  function openReply() {
    if (isReplyOpen || newMailQueue.length === 0) {
      return;
    }

    const replyData = newMailQueue.shift();

    isReplyOpen = true;
    notification.hidden = true;

    overlay.hidden = false;
    reply.hidden = false;

    renderReply(replyData);
  }

  function renderReply(replyData) {
    typingToken += 1;

    const currentToken = typingToken;

    replyText.innerHTML = "";
    replySuffix.textContent = "";

    if (replyData.suffix) {
      replySuffix.textContent = replyData.suffix;
      replySuffix.hidden = false;
    } else {
      replySuffix.hidden = true;
    }

    renderSegments(replyData.segments, currentToken, function() {
      if (currentToken !== typingToken || !isReplyOpen) {
        return;
      }

      if (replyData.options) {
        appendOptions(replyData.options);
      }

      if (replyData.showXPost) {
        appendXPostButton();
      }
    });
  }

  function renderSegments(segments, token, finished) {
    let segmentIndex = 0;

    function renderNextSegment() {
      if (token !== typingToken || !isReplyOpen) {
        return;
      }

      if (segmentIndex >= segments.length) {
        finished();
        return;
      }

      const segment = segments[segmentIndex];

      if (segment.type === "list") {
        const list = document.createElement("ul");
        list.className = "reply-list";

        segment.items.forEach(function(itemText) {
          const item = document.createElement("li");
          item.textContent = itemText;
          list.appendChild(item);
        });

        replyText.appendChild(list);
        segmentIndex += 1;

        setTimeout(renderNextSegment, 80);
        return;
      }

      const paragraph = document.createElement("div");
      paragraph.className = "reply-paragraph";
      replyText.appendChild(paragraph);

      let characterIndex = 0;

      function typeNextCharacter() {
        if (token !== typingToken || !isReplyOpen) {
          return;
        }

        if (characterIndex < segment.text.length) {
          paragraph.textContent += segment.text.charAt(characterIndex);
          characterIndex += 1;

          setTimeout(typeNextCharacter, 25);
          return;
        }

        segmentIndex += 1;
        setTimeout(renderNextSegment, 80);
      }

      typeNextCharacter();
    }

    renderNextSegment();
  }

  function appendOptions(optionNumbers) {
    const optionArea = document.createElement("div");
    optionArea.className = "optionArea";

    optionNumbers.forEach(function(optionNumber) {
      const optionButton = document.createElement("button");

      optionButton.type = "button";
      optionButton.className = "optionBtn";
      optionButton.textContent = optionLabels[optionNumber];

      optionButton.addEventListener("click", function() {
        optionClick(optionNumber);
      });

      optionArea.appendChild(optionButton);
    });

    replyText.appendChild(optionArea);
  }

  function optionClick(optionNumber) {
    const nextReply = optionReplies[optionNumber];

    if (!nextReply) {
      return;
    }

    closeReplyForNextMail();
    queueNewMail(nextReply);
  }

  function appendXPostButton() {
    const wrap = document.createElement("div");
    wrap.className = "xPostWrap";

    const xPostButton = document.createElement("button");
    xPostButton.type = "button";
    xPostButton.className = "xPostBtn";
    xPostButton.textContent = "Xで報告する";

    xPostButton.addEventListener("click", postToX);

    wrap.appendChild(xPostButton);
    replyText.appendChild(wrap);
  }

  function postToX() {
    const originalPostUrl = "https://x.com/r4lu3m8l/status/2066838202921480355?s=20";

    const postText =
      "【File003：おりたたみ探偵事務所　パン屋強盗事件】\n" +
      "パン屋強盗事件の報告を完了。\n" +
      "N.Fに報告した\n" +
      "#おりたたみ探偵事務所 #謎解き";

    const postUrl =
      "https://x.com/intent/post?text=" +
      encodeURIComponent(postText) +
      "&url=" +
      encodeURIComponent(originalPostUrl);

    window.open(postUrl, "_blank", "noopener,noreferrer");
  }

  function hideReplyWindow() {
    typingToken += 1;

    isReplyOpen = false;

    overlay.hidden = true;
    reply.hidden = true;

    replyText.innerHTML = "";
    replySuffix.textContent = "";
    replySuffix.hidden = true;
  }

  function closeReply() {
    hideReplyWindow();

    newMailQueue.length = 0;
    notification.hidden = true;

    status.hidden = true;
    mailBox.classList.remove("sending");

    answerBox.value = "";
    isSending = false;

    updateSendButton();

    setTimeout(function() {
      answerBox.focus();
    }, 0);
  }

  function closeReplyForNextMail() {
    hideReplyWindow();

    notification.hidden = true;

    status.hidden = true;
    mailBox.classList.remove("sending");

    answerBox.value = "";
    isSending = false;

    updateSendButton();

    setTimeout(function() {
      answerBox.focus();
    }, 0);
  }

  answerBox.addEventListener("input", updateSendButton);
  sendButton.addEventListener("click", sendMail);

  notification.addEventListener("click", openReply);

  closeReplyButton.addEventListener("click", closeReply);
  overlay.addEventListener("click", closeReply);

  updateSendButton();
</script>

</body>
</html>
