<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パン屋強盗事件　報告メール</title>
<style>
body {margin:0;height:100vh;background:#e9eef3;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;flex-direction:column;padding:14px;}
.app {width:100%; max-width:760px;}
.mail {background:white;border-radius:12px;box-shadow:0 20px 40px rgba(0,0,0,0.2);overflow:hidden;transition:0.6s;}
.mail.sending {transform:translateY(-18px);opacity:0.45;}
.header {background:#2f3542;color:white;padding:14px 18px;font-weight:bold;}
.row {display:flex;padding:12px 18px;border-bottom:1px solid #ddd;}
.label {width:80px;color:#777;}
textarea {width:100%;height:300px;padding:22px;font-size:16px;line-height:1.7;border:none;resize:none;outline:none;font-family:inherit;background:white;box-sizing:border-box;}
.footer {background:#f1f2f6;padding:14px 18px;text-align:right;}
button {background:#494B9D;color:white;border:none;border-radius:6px;padding:10px 28px;font-size:15px;cursor:pointer;}
button:disabled {background:#999;cursor:not-allowed;opacity:0.5;}
.status {display:none;margin-top:16px;text-align:center;color:#555;}
.notification {display:none;margin-top:20px;background:white;padding:16px 18px;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,0.12);cursor:pointer;animation:fadeIn 0.5s;}
.reply {display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:600px;background:white;color:#222;border-radius:12px;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,0.3);z-index:1000;}
.reply-title {font-weight:bold;margin-bottom:18px;line-height:1.6;border-bottom:1px solid #ddd;padding-bottom:12px;}
#replyText {line-height:1.8;white-space:pre-line;}
.closeBtn {position:absolute;top:12px;right:16px;background:none;border:none;color:#666;font-size:24px;cursor:pointer;padding:0;width:auto;}
.closeBtn:hover {color:#000;}
.xPostBtn {display:none;margin:16px auto 0 auto;background:#000;color:white;border:none;border-radius:8px;padding:10px 22px;font-size:14px;cursor:pointer;text-align:center;}
.xPostBtn:hover {opacity:0.8;}
.optionBtn {display:none;margin:8px 0 0 0;background:#494B9D;color:white;border:none;border-radius:6px;padding:10px 28px;font-size:15px;cursor:pointer;text-align:left;width:100%;}
.optionBtn:hover {opacity:0.8;}
.overlay {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:999;}
footer {margin-top:24px;font-size:12px;color:#555;text-align:center;width:100%;}
</style>
</head>
<body>

<div class="app">
  <div class="mail" id="mailBox">
    <div class="header">パン屋強盗事件　報告メール</div>
    <div class="row"><div class="label">To</div><div>N.F@koreha.fiction.da</div></div>
    <div class="row"><div class="label">Subject</div><div>パン屋強盗事件　報告メール</div></div>
    <textarea id="answer" placeholder="ここに報告内容を入力してください" oninput="checkInput()"></textarea>
    <div class="footer"><button id="sendButton" onclick="sendMail()" disabled>送信</button></div>
  </div>

  <div id="status" class="status">送信中...</div>
  <div id="notification" class="notification" onclick="openReply()"></div>
</div>

<div id="overlay" class="overlay" onclick="closeReply()"></div>

<div id="reply" class="reply">
  <button class="closeBtn" onclick="closeReply()">×</button>
  <div class="reply-title">From: N.F@koreha.fiction.da<br>Subject: RE: パン屋強盗事件　報告メール</div>
  <div id="replyText"></div>
  <button id="xPostButton" class="xPostBtn" onclick="postToX()">Xで報告する</button>
  <button id="opt1" class="optionBtn" onclick="optionClick(1)">①1/9、7/9、9/9について</button>
  <button id="opt2" class="optionBtn" onclick="optionClick(2)">②ある程度わかったが次どうしたらいいか</button>
  <button id="opt3" class="optionBtn" onclick="optionClick(3)">③その先がわからない</button>
  <button id="opt4" class="optionBtn" onclick="optionClick(4)">④もう少し一緒に考えてほしい</button>
</div>

<footer>
  本作品はフィクションです。実際の地名・団体・人物とは一切関係ございません。<br>
  X: @r4lu3m8l
</footer>

<script>
const answerBox=document.getElementById("answer");
const sendButton=document.getElementById("sendButton");
const notification=document.getElementById("notification");
const status=document.getElementById("status");
const mailBox=document.getElementById("mailBox");

let replyMessage="", typingTimer=null, canPostToX=false;
let newMailQueue=[];

const words={
  product:["商品名"],
  cat:["cat","Cat","ネコ","キャット","猫"],
  hint:["わからない","ヒント"],
  menu:["menu list","メニューリスト","Menu List"],
  bread:["bread","BREAD","パン"],
  mitaShun:["三田駅","みたえき","mitaeki","春野鏡子"],
  nf:["N.F"],
  english:["英語"],
  otherLanguages:["スペイン語","ハングル","中国語","ロシア語","フランス語","ドイツ語","イタリア語","ポルトガル語","アラビア語","ヒンディー語","タイ語","ベトナム語","インドネシア語","トルコ語","韓国語","日本語"]
};

function checkInput(){ sendButton.disabled = answerBox.value.trim() === ""; }

function sendMail(){
  const input=answerBox.value.trim();
  if(!input) return;

  sendButton.disabled=true;
  status.style.display="block";
  status.textContent="送信中...";
  mailBox.classList.add("sending");
  notification.style.display="none";

  const hasCat=words.cat.some(w=>input.includes(w));
  const hasProduct=words.product.some(w=>input.includes(w));
  const hasMenu=words.menu.some(w=>input.includes(w));
  const hasBread=words.bread.some(w=>input.includes(w));
  const hasMitaShun=words.mitaShun.some(w=>input.includes(w));
  const hasHint=words.hint.some(w=>input.includes(w));
  const hasEnglish=words.english.some(w=>input.includes(w));
  const hasOtherLang=words.otherLanguages.some(w=>input.includes(w));
  const hasNF=words.nf.some(w=>input.includes(w));

  let msg="";
  if(hasCat){ msg="パン屋強盗事件　報告を受領した。\n猫、か。\nご主人に聞いたところ飼い猫の「ミルクちゃん」は日課の散歩にでかけたそうだ。\nミルクちゃんを追えば何かわかるかもしれない。\n\n今回も見事な推理だった。また頼むよ。";}
  else if(hasProduct){ msg="なるほど…商品名か。\nしかしそれでは盗まれたものがわからないな。\n私にできることはあるだろうか？";}
  else if(hasMenu){ msg="メニューリスト…ああここにあった。内容を共有する。\n<ul><li>フランスパン</li><li>チョココロネ</li><li>アップルパイ</li><li>クロワッサン</li><li>メロンパン</li><li>食パン</li><li>サンドウィッチ</li></ul>\n何か役に立つだろうか";}
  else if(hasBread){ msg="ポイントカードの店に来たが、まさかここでも事件が起こるとはな。\nなんだか怖くなってきたよ。";}
  else if(hasMitaShun){ msg="次々と事件が起こるな…。";}
  else if(hasHint){ msg="一緒に思考を整理しよう。\nまずは君の推理を聞かせてくれ。";}
  else if(hasEnglish){ msg="なるほど、英語か…\n<ul><li>French bread</li><li>Chocolate cornet</li><li>Apple pie</li><li>Croissant</li><li>Melon pan</li><li>White bread</li><li>Sandwich</li></ul>";}
  else if(hasOtherLang){ msg="すまない…その言語には明るくなくてね…";}
  else if(hasNF){ msg="こういった暗号や謎の類は苦手でね…足で捜査することなら任せてくれ。";}
  else{ msg="なるほど…情報が足りない。もう一度確認してほしい。";}

  newMailQueue.push(msg);
  answerBox.value="";

  setTimeout(()=>{
    status.style.display="none";
    mailBox.classList.remove("sending");
    checkInput();
    if(newMailQueue.length>0){
      notification.innerHTML = "📩 新着メール 1件<br><strong>From: N.F@koreha.fiction.da</strong>";
      notification.style.display = "block";
    }
  },1200);
}

// openReply, closeReply, postToX, optionClick は以前通り
</script>

</body>
</html>
